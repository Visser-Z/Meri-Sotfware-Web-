<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Meri Software builds custom AI-powered software for South African businesses. Workflow automation, AI integration, and bespoke software development.">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meri Software — We build the software that puts AI to work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARS ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#FFFFFF;
  --off-white:#F9F8F6;
  --light:#F2F0EC;
  --gold:#B8960C;
  --gold-light:#D4AF37;
  --gold-pale:#FAF5E4;
  --ink:#111111;
  --ink2:#333333;
  --ink3:#666666;
  --ink4:#999999;
  --blue:#4A7FD4;
  --blue-light:#6B9FE4;
  --border:#E5E2DB;
  --border-dark:#CCCCCC;
}
html{scroll-behavior:smooth}
body{background:var(--white);color:var(--ink);font-family:'Inter',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ── PAGE TRANSITION ── */
#app{opacity:1;transition:opacity .18s ease}
#app.fade-out{opacity:0}
#app.fade-in{animation:pageIn .3s ease forwards}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 60px;height:72px;
  background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  transition:height .3s;
}
nav.scrolled{height:60px}
.logo{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:500;letter-spacing:0.3px;
  color:var(--ink);text-decoration:none;cursor:pointer;
}
.logo span{color:var(--gold)}
.nav-links{display:flex;gap:40px;list-style:none}
.nav-links a{
  font-size:13px;font-weight:400;letter-spacing:0.3px;
  color:var(--ink3);text-decoration:none;transition:color .2s;cursor:pointer;
}
.nav-links a:hover,.nav-links a.active{color:var(--ink)}
.nav-btn{
  font-size:12px;font-weight:500;letter-spacing:0.5px;
  background:var(--ink);color:var(--white);border:none;
  padding:10px 24px;cursor:pointer;transition:all .15s;border-radius:2px;
}
.nav-btn:hover{background:var(--ink2)}

/* ── BUTTONS ── */
.btn-primary{
  font-size:13px;font-weight:500;letter-spacing:0.4px;
  background:var(--ink);color:var(--white);border:none;padding:14px 32px;
  cursor:pointer;transition:all .15s;display:inline-block;text-decoration:none;border-radius:2px;
}
.btn-primary:hover{background:var(--ink2)}
.btn-gold{
  font-size:13px;font-weight:500;letter-spacing:0.4px;
  background:var(--gold);color:var(--white);border:none;padding:14px 32px;
  cursor:pointer;transition:all .15s;display:inline-block;text-decoration:none;border-radius:2px;
}
.btn-gold:hover{background:var(--gold-light)}
.btn-outline{
  font-size:13px;font-weight:400;letter-spacing:0.3px;
  background:transparent;color:var(--ink);border:1px solid var(--border-dark);padding:14px 32px;
  cursor:pointer;transition:all .15s;display:inline-block;text-decoration:none;border-radius:2px;
}
.btn-outline:hover{border-color:var(--ink);background:var(--ink);color:var(--white)}

/* ── PAGE HERO (inner pages) ── */
.page-hero{
  padding:140px 60px 72px;
  border-bottom:1px solid var(--border);
  background:var(--white);
}
.page-hero-kicker{
  font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);margin-bottom:24px;
}
.page-hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(40px,6vw,68px);font-weight:500;line-height:1.1;
  color:var(--ink);max-width:700px;
}
.page-hero h1 em{font-style:italic;color:var(--gold)}
.page-hero-sub{
  font-size:16px;line-height:1.8;color:var(--ink3);
  max-width:560px;font-weight:300;margin-top:28px;
}
.page-hero-sub strong{color:var(--ink);font-weight:500}

/* ── UTILITIES ── */
.eyebrow{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,48px);font-weight:500;color:var(--ink);line-height:1.15;margin-top:0}
.section-title em{font-style:italic;color:var(--gold)}
.divider{height:1px;background:var(--border);margin:0}

/* ── TICKER ── */
.ticker{background:var(--ink);padding:12px 0;overflow:hidden;white-space:nowrap}
.ticker-track{display:inline-flex;animation:roll 35s linear infinite}
.ticker-item{font-size:11px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);padding:0 36px;display:inline-flex;align-items:center;gap:16px}
.ticker-item::after{content:'◆';font-size:6px;opacity:.4;color:var(--gold-light)}
@keyframes roll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── FOOTER ── */
footer{
  padding:60px;background:var(--ink);color:rgba(255,255,255,0.7);
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:40px;align-items:start;
  margin-top:0;border-top:none;
}
.foot-brand .logo-f{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:var(--white);margin-bottom:12px}
.foot-brand .logo-f span{color:var(--gold-light)}
.foot-brand p{font-size:13px;line-height:1.7;color:rgba(255,255,255,0.5);margin-top:8px;max-width:260px}
.foot-col h4{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:20px}
.foot-col a{display:block;font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;margin-bottom:10px;cursor:pointer;transition:color .2s}
.foot-col a:hover{color:var(--white)}
.foot-bottom{background:var(--ink);padding:20px 60px;border-top:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center}
.foot-copy{font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:0.3px}
.foot-copy-right{font-size:12px;color:rgba(255,255,255,0.35)}

/* ── SCROLL REVEAL ── */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-grid{opacity:1;transform:none}
.reveal-grid .card-item{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
.reveal-grid.visible .card-item:nth-child(1){opacity:1;transform:none;transition-delay:0ms}
.reveal-grid.visible .card-item:nth-child(2){opacity:1;transform:none;transition-delay:80ms}
.reveal-grid.visible .card-item:nth-child(3){opacity:1;transform:none;transition-delay:160ms}
.reveal-grid.visible .card-item:nth-child(4){opacity:1;transform:none;transition-delay:240ms}
.reveal-grid.visible .card-item:nth-child(5){opacity:1;transform:none;transition-delay:320ms}
.reveal-grid.visible .card-item:nth-child(6){opacity:1;transform:none;transition-delay:400ms}

/* ══ HOME PAGE ══ */
.hero{
  min-height:100vh;padding:160px 60px 100px;
  display:flex;flex-direction:column;justify-content:center;
  background:var(--white);border-bottom:1px solid var(--border);
  position:relative;
}
.hero-eyebrow{font-size:11px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:32px;animation:fadeUp .6s .1s both}
.hero-h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(52px,8vw,96px);font-weight:500;line-height:1.05;
  color:var(--ink);max-width:800px;margin-bottom:40px;
  animation:fadeUp .7s .2s both;
}
.hero-h1 em{font-style:italic;color:var(--gold)}
.hero-sub{font-size:17px;line-height:1.8;color:var(--ink3);max-width:520px;font-weight:300;margin-bottom:48px;animation:fadeUp .7s .35s both}
.hero-sub strong{color:var(--ink);font-weight:500}
.hero-ctas{display:flex;gap:16px;align-items:center;animation:fadeUp .7s .45s both}
.hero-divider{position:absolute;bottom:0;left:60px;right:60px;height:1px;background:var(--border)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border);background:var(--off-white)}
.stat-cell{padding:48px 40px;border-right:1px solid var(--border)}
.stat-cell:last-child{border-right:none}
.stat-num{font-family:'Playfair Display',serif;font-size:52px;font-weight:400;line-height:1;color:var(--ink);margin-bottom:8px}
.stat-num .suf{font-size:28px;color:var(--gold)}
.stat-label{font-size:12px;font-weight:400;letter-spacing:0.5px;color:var(--ink4)}

/* Services preview */
.services-preview{padding:80px 60px;border-bottom:1px solid var(--border)}
.services-preview-hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:56px}
.services-preview-hd .right{font-size:13px;color:var(--ink4);cursor:pointer;transition:color .2s}
.services-preview-hd .right:hover{color:var(--gold)}
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.card-item.preview-card{
  background:var(--white);padding:36px 28px;transition:background .2s;
  border:none;position:relative;
}
.card-item.preview-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent;transition:background .25s}
.card-item.preview-card:hover{background:var(--gold-pale)}
.card-item.preview-card:hover::after{background:var(--gold)}
.preview-icon{width:40px;height:40px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:24px;font-size:16px;color:var(--gold)}
.preview-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:var(--ink);margin-bottom:10px;line-height:1.2}
.preview-body{font-size:13px;line-height:1.7;color:var(--ink3);font-weight:300}

/* Statement section */
.statement{padding:100px 60px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;border-bottom:1px solid var(--border);background:var(--off-white)}
.statement-left .eyebrow{margin-bottom:20px}
.statement-left h2{font-family:'Playfair Display',serif;font-size:clamp(36px,4vw,52px);font-weight:500;line-height:1.15;color:var(--ink)}
.statement-left h2 em{font-style:italic;color:var(--gold)}
.statement-right{display:flex;flex-direction:column;gap:36px;padding-top:8px}
.stmt-point{padding-left:20px;border-left:2px solid var(--gold)}
.stmt-point-title{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:6px}
.stmt-point-body{font-size:13px;line-height:1.75;color:var(--ink3);font-weight:300}

/* Testimonials */
.proof-strip{padding:80px 60px;border-bottom:1px solid var(--border)}
.proof-strip-hd{font-family:'Playfair Display',serif;font-size:clamp(28px,3.5vw,40px);font-weight:400;font-style:italic;color:var(--ink);margin-bottom:56px}
.proof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
.card-item.proof-card{background:var(--white);padding:40px 32px}
.proof-quote{font-size:14px;line-height:1.85;color:var(--ink2);font-weight:300;margin-bottom:28px;font-style:italic}
.proof-quote::before{content:'\201C';font-family:'Playfair Display',serif;font-size:40px;line-height:0;vertical-align:-16px;margin-right:2px;color:var(--gold);font-style:normal}
.proof-attr{display:flex;align-items:center;gap:12px}
.proof-line{width:20px;height:1px;background:var(--gold);flex-shrink:0}
.proof-name{font-size:12px;font-weight:500;color:var(--ink);letter-spacing:0.3px}
.proof-company{font-size:11px;color:var(--ink4);margin-top:2px}

/* CTA strip */
.cta-strip{padding:80px 60px;background:var(--ink);display:flex;align-items:center;justify-content:space-between;gap:40px}
.cta-strip-left h2{font-family:'Playfair Display',serif;font-size:clamp(28px,3.5vw,44px);font-weight:500;color:var(--white);line-height:1.2}
.cta-strip-left h2 em{font-style:italic;color:var(--gold-light)}
.cta-strip-left p{font-size:15px;color:rgba(255,255,255,0.5);margin-top:12px;font-weight:300}
.cta-strip-right{flex-shrink:0;display:flex;gap:12px}
.btn-gold-outline{
  font-size:13px;font-weight:400;letter-spacing:0.3px;
  background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);padding:14px 32px;
  cursor:pointer;transition:all .15s;display:inline-block;text-decoration:none;border-radius:2px;
}
.btn-gold-outline:hover{border-color:rgba(255,255,255,0.5);color:var(--white)}

/* ══ SERVICES PAGE ══ */
.services-list{display:grid;grid-template-columns:1fr 1fr}
.svc{padding:56px 48px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .2s;position:relative}
.svc:nth-child(even){border-right:none}
.svc:hover{background:var(--gold-pale)}
.svc-icon{font-size:24px;margin-bottom:28px;display:block}
.svc-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:500;color:var(--ink);margin-bottom:14px;line-height:1.2}
.svc-body{font-size:14px;line-height:1.8;color:var(--ink3);font-weight:300;margin-bottom:28px;max-width:420px}
.svc-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.tag{font-size:11px;font-weight:400;letter-spacing:0.5px;border:1px solid var(--border);color:var(--ink3);padding:5px 12px;display:inline-block;border-radius:2px}
.svc-features{list-style:none;display:flex;flex-direction:column;gap:8px}
.svc-features li{font-size:13px;color:var(--ink3);font-weight:300;display:flex;align-items:flex-start;gap:10px;line-height:1.5}
.svc-features li::before{content:'✓';color:var(--gold);flex-shrink:0;font-size:12px;margin-top:1px}

/* ══ PROCESS PAGE ══ */
.process-full{padding:0 60px 100px}
.steps-large{display:flex;flex-direction:column}
.step-row{display:grid;grid-template-columns:120px 1fr;border-bottom:1px solid var(--border);padding:60px 0;gap:60px;align-items:start;transition:background .2s}
.step-row:first-child{border-top:1px solid var(--border)}
.step-row:hover{background:var(--off-white)}
.step-num{font-family:'Playfair Display',serif;font-size:13px;font-weight:400;color:var(--gold);padding-top:4px}
.step-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:500;color:var(--ink);margin-bottom:14px;line-height:1.2}
.step-body{font-size:15px;line-height:1.85;color:var(--ink3);font-weight:300;max-width:560px;margin-bottom:24px}
.step-details{display:flex;flex-wrap:wrap;gap:8px}

.guarantee-strip{background:var(--off-white);border:1px solid var(--border);padding:56px 48px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:40px;margin:0 60px 80px}
.guarantee-icon{font-size:28px;margin-bottom:14px;color:var(--gold)}
.guarantee-title{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:8px}
.guarantee-body{font-size:13px;line-height:1.75;color:var(--ink3);font-weight:300}

/* ══ ABOUT PAGE ══ */
.about-split{padding:72px 60px;display:grid;grid-template-columns:1fr 1.2fr;gap:80px;align-items:start;border-bottom:1px solid var(--border)}
.about-left h2{font-family:'Playfair Display',serif;font-size:clamp(36px,4vw,52px);font-weight:500;line-height:1.1;color:var(--ink);margin-top:16px;margin-bottom:28px}
.about-body{font-size:15px;line-height:1.9;color:var(--ink3);font-weight:300;margin-bottom:16px}
.about-right{display:flex;flex-direction:column}
.about-block{padding:28px 0;border-top:1px solid var(--border);display:grid;grid-template-columns:60px 1fr;gap:20px;align-items:start}
.about-block:last-child{border-bottom:1px solid var(--border)}
.about-block-num{font-family:'Playfair Display',serif;font-size:13px;color:var(--gold);padding-top:2px}
.about-block-title{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:6px}
.about-block-body{font-size:13px;line-height:1.75;color:var(--ink3);font-weight:300}

.sectors{padding:72px 60px;border-bottom:1px solid var(--border);background:var(--off-white)}
.sectors-header{margin-bottom:48px}
.sectors-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
.card-item.sector-card{background:var(--off-white);padding:36px 32px;transition:background .2s}
.card-item.sector-card:hover{background:var(--gold-pale)}
.sector-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;color:var(--ink);margin-bottom:10px;line-height:1.2}
.sector-body{font-size:13px;line-height:1.7;color:var(--ink3);font-weight:300}

.values{padding:72px 60px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:280px 1fr;gap:80px;align-items:start}
.values-left h2{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,48px);font-weight:500;line-height:1.1;color:var(--ink);margin-top:16px}
.values-left h2 em{font-style:italic;color:var(--gold)}
.values-right{display:flex;flex-direction:column}
.value-row{display:flex;gap:40px;padding:28px 0;border-bottom:1px solid var(--border);align-items:start}
.value-row:first-child{border-top:1px solid var(--border)}
.value-num{font-family:'Playfair Display',serif;font-size:13px;color:var(--gold);flex-shrink:0;width:24px;padding-top:2px}
.value-title{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:6px}
.value-body{font-size:13px;line-height:1.75;color:var(--ink3);font-weight:300}

/* ══ CONTACT PAGE ══ */
.contact-layout{padding:72px 60px 100px;display:grid;grid-template-columns:1fr 1.1fr;gap:80px;align-items:start}
.contact-left h2{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,48px);font-weight:500;line-height:1.1;color:var(--ink);margin-top:16px;margin-bottom:24px}
.contact-body{font-size:15px;line-height:1.85;color:var(--ink3);font-weight:300;margin-bottom:44px}
.contact-links{display:flex;flex-direction:column}
.c-link{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-top:1px solid var(--border);cursor:pointer;transition:all .2s;text-decoration:none}
.c-link:last-child{border-bottom:1px solid var(--border)}
.c-link:hover .c-link-label{color:var(--gold)}
.c-link:hover .c-arr{transform:translate(4px,-4px);color:var(--gold)}
.c-link-label{font-size:15px;font-weight:500;color:var(--ink);transition:color .2s}
.c-link-sub{font-size:12px;color:var(--ink4);margin-top:3px;letter-spacing:0.2px}
.c-arr{font-size:18px;color:var(--ink4);transition:all .2s}

.contact-form{display:flex;flex-direction:column}
.form-row{position:relative;border-top:1px solid var(--border)}
.form-row:last-of-type{border-bottom:1px solid var(--border);margin-bottom:28px}
.form-row label{display:block;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--ink4);padding:18px 0 4px}
.form-row input,.form-row textarea,.form-row select{
  width:100%;background:transparent;border:none;font-family:'Inter',sans-serif;
  font-size:15px;color:var(--ink);padding:0 0 16px;outline:none;resize:none;font-weight:300;
}
.form-row select{cursor:pointer;-webkit-appearance:none;color:var(--ink3)}
.form-row input::placeholder,.form-row textarea::placeholder{color:var(--ink4)}
.form-submit{
  font-size:13px;font-weight:500;letter-spacing:0.4px;
  background:var(--ink);color:var(--white);border:none;padding:16px 36px;
  cursor:pointer;transition:all .15s;border-radius:2px;
}
.form-submit:hover{background:var(--gold)}
.form-success{background:var(--gold-pale);border:1px solid var(--gold);padding:28px;border-radius:2px;display:none}
.form-success p{font-size:14px;color:var(--ink2);line-height:1.7}

/* FAQ */
.faq{padding:72px 60px;border-bottom:1px solid var(--border);background:var(--off-white)}
.faq-header{margin-bottom:48px}
.faq-list{max-width:760px}
.faq-item{border-top:1px solid var(--border)}
.faq-item:last-child{border-bottom:1px solid var(--border)}
.faq-q{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 0;cursor:pointer;transition:color .2s;
  font-size:15px;font-weight:400;color:var(--ink);
}
.faq-q:hover{color:var(--gold)}
.faq-toggle{font-size:20px;color:var(--ink4);transition:transform .25s;flex-shrink:0;margin-left:20px;font-weight:300}
.faq-item.open .faq-toggle{transform:rotate(45deg);color:var(--gold)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease}
.faq-item.open .faq-a{max-height:300px}
.faq-a p{font-size:14px;line-height:1.8;color:var(--ink3);font-weight:300;padding-bottom:20px}

/* WhatsApp float */
.wa-float{
  position:fixed;bottom:28px;right:28px;z-index:150;
  display:flex;align-items:center;gap:10px;
  background:var(--ink);color:var(--white);
  padding:12px 20px 12px 16px;text-decoration:none;
  border-radius:2px;box-shadow:0 4px 20px rgba(0,0,0,0.15);
  transition:background .2s;
}
.wa-float:hover{background:var(--ink2)}
.wa-float svg{width:18px;height:18px;flex-shrink:0;color:#25D366}
.wa-float-text{font-size:12px;font-weight:500;letter-spacing:0.3px}

/* Mobile nav */
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none}
.nav-hamburger span{display:block;width:22px;height:1.5px;background:var(--ink);transition:all .25s}
.nav-hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.nav-hamburger.open span:nth-child(2){opacity:0}
.nav-hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.mobile-menu{
  position:fixed;top:0;right:0;bottom:0;width:280px;
  background:var(--white);border-left:1px solid var(--border);
  z-index:199;padding:100px 40px 48px;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);
  display:flex;flex-direction:column;
}
.mobile-menu.open{transform:translateX(0)}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:198}
.mobile-overlay.open{display:block}
.mobile-menu a{
  font-size:14px;font-weight:400;color:var(--ink3);text-decoration:none;cursor:pointer;
  padding:16px 0;border-bottom:1px solid var(--border);transition:color .2s;display:block;
}
.mobile-menu a:first-child{border-top:1px solid var(--border)}
.mobile-menu a:hover{color:var(--gold)}
.mobile-menu .mob-cta{
  font-size:13px;font-weight:500;background:var(--ink);color:var(--white);
  border:none;padding:14px 24px;cursor:pointer;margin-top:32px;width:100%;text-align:left;border-radius:2px;
}

<script>
window.toggleMobileMenu = function() {
  const menu = document.getElementById('mobile-menu');
  const overlay = document.getElementById('mobile-overlay');
  const burger = document.getElementById('hamburger');
  const isOpen = menu.classList.toggle('open');
  overlay.classList.toggle('open', isOpen);
  burger.classList.toggle('open', isOpen);
  document.body.style.overflow = isOpen ? 'hidden' : '';
};
window.closeMobileMenu = function() {
  document.getElementById('mobile-menu').classList.remove('open');
  document.getElementById('mobile-overlay').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
  document.body.style.overflow = '';
};

function setYear() {
  document.querySelectorAll('.year').forEach(el => el.textContent = new Date().getFullYear());
}

const app = document.getElementById('app');
const navEl = document.getElementById('nav');

function navigate(page) {
  app.classList.add('fade-out');
  setTimeout(() => {
    app.classList.remove('fade-out');
    loadPage(page);
    window.scrollTo(0,0);
    app.classList.add('fade-in');
    setTimeout(() => app.classList.remove('fade-in'), 350);
  }, 180);
}

function loadPage(page) {
  const tpl = document.getElementById('tpl-' + page);
  if (!tpl) return;
  app.innerHTML = tpl.innerHTML;

  document.querySelectorAll('.nav-links a').forEach(a => {
    a.classList.remove('active');
    if (a.getAttribute('onclick') && a.getAttribute('onclick').includes("'" + page + "'")) {
      a.classList.add('active');
    }
  });

  const titles = {
    home:'Meri Software — We build the software that puts AI to work',
    services:'Services — Meri Software',
    process:'Our Process — Meri Software',
    about:'About Us — Meri Software',
    contact:'Contact — Meri Software'
  };
  document.title = titles[page] || 'Meri Software';

  const reveals = app.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, {threshold:0.06, rootMargin:'0px 0px -40px 0px'});
  reveals.forEach(el => observer.observe(el));

  const numSection = app.querySelector('#numbers-section');
  if (numSection) {
    const numObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (!e.isIntersecting) return;
        numObserver.unobserve(e.target);
        e.target.querySelectorAll('[data-count]').forEach(el => {
          const target = parseInt(el.dataset.count);
          if (target === 0) return;
          const valEl = el.querySelector('.num-val');
          const duration = 1200;
          const start = performance.now();
          function tick(now) {
            const progress = Math.min((now - start) / duration, 1);
            const ease = 1 - Math.pow(1 - progress, 3);
            valEl.textContent = Math.round(ease * target);
            if (progress < 1) requestAnimationFrame(tick);
          }
          requestAnimationFrame(tick);
        });
      });
    }, {threshold: 0.3});
    numObserver.observe(numSection);
  }

  history.pushState({page}, '', '#' + page);
  setYear();
}

window.addEventListener('scroll', () => {
  navEl.classList.toggle('scrolled', window.scrollY > 60);
});

window.addEventListener('popstate', (e) => {
  if (e.state && e.state.page) loadPage(e.state.page);
});

window.handleSubmit = async function() {
  const name = document.getElementById('f-name')?.value.trim();
  const email = document.getElementById('f-email')?.value.trim();
  const company = document.getElementById('f-company')?.value.trim();
  const type = document.getElementById('f-type')?.value;
  const msg = document.getElementById('f-message')?.value.trim();
  if (!name || !email || !msg) { alert('Please fill in your name, email, and message before sending.'); return; }

  const btn = document.querySelector('.form-submit');
  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    const res = await fetch('https://formspree.io/f/xdavnknv', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ name, email, company, type, message: msg })
    });
    if (res.ok) {
      document.getElementById('contact-form').style.display = 'none';
      document.getElementById('form-success').style.display = 'block';
    } else {
      btn.textContent = 'Send Message →'; btn.disabled = false;
      alert('Something went wrong. Please email us directly at Visser-Meridian@outlook.com');
    }
  } catch(e) {
    btn.textContent = 'Send Message →'; btn.disabled = false;
    alert('Could not send. Please email us directly at Visser-Meridian@outlook.com');
  }
};

window.toggleFaq = function(el) {
  const item = el.closest('.faq-item');
  const wasOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
  if (!wasOpen) item.classList.add('open');
};

const initPage = (location.hash.replace('#','')) || 'home';
loadPage(initPage);
</script>
