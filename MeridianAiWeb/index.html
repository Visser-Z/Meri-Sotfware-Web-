<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="At Meri-Software, we build the software that puts AI to work. Based in South Africa, specialising in workflow automation, AI integration, and custom software development.">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meri-Software — We build the software that puts AI to work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARS ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --k:#0A1628;--k1:#0D1F3C;--k2:#152342;--k3:#1E2E50;
  --lime:#4A7FD4;--lime2:#6B9FE4;
  --wire:rgba(74,127,212,0.12);--wire2:rgba(74,127,212,0.25);
  --fg:#F0F4FF;--fg2:#8A9BB8;--fg3:#4A5C78;
}
html{scroll-behavior:smooth}
body{background:var(--k);color:var(--fg);font-family:'DM Sans',sans-serif;overflow-x:hidden}

/* ── PAGE TRANSITION ── */
#app{opacity:1;transition:opacity .2s ease}
#app.fade-out{opacity:0;transform:translateY(8px);transition:opacity .18s ease,transform .18s ease}
#app.fade-in{animation:pageIn .35s ease forwards}
@keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 56px;
  background:rgba(10,22,40,0.95);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.04);transition:padding .3s;
}
nav.scrolled{padding:14px 56px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--fg);text-decoration:none;cursor:pointer}
.logo b{color:var(--lime)}
.nav-links{display:flex;gap:44px;list-style:none}
.nav-links a{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--fg3);text-decoration:none;transition:color .2s;
  position:relative;padding-bottom:4px;cursor:pointer;
}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--lime);transition:width .25s ease}
.nav-links a:hover{color:var(--lime)}
.nav-links a:hover::after{width:100%}
.nav-links a.active{color:var(--lime)}
.nav-links a.active::after{width:100%}
.nav-btn{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  background:transparent;color:var(--lime);border:1px solid var(--lime2);
  padding:11px 28px;cursor:pointer;transition:all .15s;
}
.nav-btn:hover{background:var(--lime);color:#fff}

/* ── BUTTONS ── */
.btn-solid{
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  background:var(--lime);color:#fff;border:none;padding:18px 44px;
  cursor:pointer;font-weight:500;transition:all .15s;display:inline-block;text-decoration:none;
}
.btn-solid:hover{background:var(--lime2);transform:translateY(-1px)}
.btn-line{
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  background:transparent;color:var(--fg2);border:1px solid var(--k3);padding:18px 44px;
  cursor:pointer;transition:all .15s;display:inline-block;text-decoration:none;
}
.btn-line:hover{border-color:var(--fg3);color:var(--fg)}

/* ── PAGE HERO (inner pages) ── */
.page-hero{padding:160px 56px 80px;border-bottom:1px solid rgba(255,255,255,0.05);position:relative;overflow:hidden}
.page-hero-kicker{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--fg3);margin-bottom:28px;display:flex;align-items:center;gap:14px}
.page-hero-kicker span{display:block;width:32px;height:1px;background:var(--fg3)}
.page-hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(64px,10vw,130px);line-height:.9;letter-spacing:-1px;color:var(--fg)}
.page-hero h1 em{font-style:normal;color:var(--lime)}
.page-hero h1 .ghost{-webkit-text-stroke:1px rgba(226,235,232,0.15);color:transparent;display:block}
.page-hero-sub{font-size:16px;line-height:1.8;color:var(--fg2);max-width:540px;font-weight:300;margin-top:40px}
.page-hero-sub strong{color:var(--fg);font-weight:500}

/* ── UTILITIES ── */
.sec-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--lime)}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,5vw,60px);color:var(--fg);line-height:1;margin-top:12px}
.sec-title em{font-style:normal;color:var(--lime)}
.tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;border:1px solid var(--k3);color:var(--fg3);padding:5px 12px;display:inline-block}

/* ── TICKER ── */
.ticker{background:#1E2D47;padding:13px 0;overflow:hidden;white-space:nowrap}
.ticker-track{display:inline-flex;animation:roll 30s linear infinite}
.ticker-item{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:#7B8FAF;padding:0 40px;display:inline-flex;align-items:center;gap:20px}
.ticker-item::after{content:'✦';font-size:9px;opacity:.5}
.ticker-item:nth-child(even){opacity:.7}
@keyframes roll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── FOOTER ── */
footer{padding:48px 56px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.05);margin-top:80px}
.foot-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--fg3)}
.foot-logo b{color:var(--lime)}
.foot-copy{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--fg3);text-transform:uppercase}
.foot-links{display:flex;gap:32px}
.foot-links a{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--fg3);text-decoration:none;transition:color .2s;cursor:pointer}
.foot-links a:hover{color:var(--lime)}

/* ── SCROLL REVEAL ── */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .65s ease,transform .65s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* Staggered child reveals */
.reveal-grid{opacity:1;transform:none}
.reveal-grid .preview-card,
.reveal-grid .proof-card,
.reveal-grid .sector-card,
.reveal-grid .svc{
  opacity:0;transform:translateY(32px);
  transition:opacity .55s ease,transform .55s ease;
}
.reveal-grid.visible .preview-card:nth-child(1),
.reveal-grid.visible .proof-card:nth-child(1),
.reveal-grid.visible .sector-card:nth-child(1),
.reveal-grid.visible .svc:nth-child(1){opacity:1;transform:none;transition-delay:0ms}
.reveal-grid.visible .preview-card:nth-child(2),
.reveal-grid.visible .proof-card:nth-child(2),
.reveal-grid.visible .sector-card:nth-child(2),
.reveal-grid.visible .svc:nth-child(2){opacity:1;transform:none;transition-delay:80ms}
.reveal-grid.visible .preview-card:nth-child(3),
.reveal-grid.visible .proof-card:nth-child(3),
.reveal-grid.visible .sector-card:nth-child(3),
.reveal-grid.visible .svc:nth-child(3){opacity:1;transform:none;transition-delay:160ms}
.reveal-grid.visible .preview-card:nth-child(4),
.reveal-grid.visible .proof-card:nth-child(4),
.reveal-grid.visible .sector-card:nth-child(4),
.reveal-grid.visible .svc:nth-child(4){opacity:1;transform:none;transition-delay:240ms}
.reveal-grid.visible .proof-card:nth-child(5),
.reveal-grid.visible .sector-card:nth-child(5),
.reveal-grid.visible .svc:nth-child(5){opacity:1;transform:none;transition-delay:320ms}
.reveal-grid.visible .sector-card:nth-child(6),
.reveal-grid.visible .svc:nth-child(6){opacity:1;transform:none;transition-delay:400ms}

/* ══════════════════════════════════════
   HOME PAGE
══════════════════════════════════════ */
.hero{min-height:100vh;padding:180px 56px 100px;position:relative;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;border-bottom:1px solid rgba(255,255,255,0.05)}
.hero-bg-num{position:absolute;right:-30px;top:50%;transform:translateY(-50%);font-family:'Bebas Neue',sans-serif;font-size:500px;color:rgba(74,127,212,0.04);line-height:1;pointer-events:none;user-select:none;letter-spacing:-10px}
.hero-kicker{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--fg3);margin-bottom:32px;display:flex;align-items:center;gap:14px;animation:fadeUp .8s .2s both}
.hero-kicker span{display:block;width:32px;height:1px;background:var(--fg3)}
.hero-h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(80px,13vw,160px);line-height:.9;letter-spacing:-1px;color:var(--fg)}
.hero-h1 .h1-line{display:block;overflow:hidden}
.hero-h1 .h1-inner{display:block;animation:lineUp .75s cubic-bezier(.16,1,.3,1) both}
.hero-h1 .h1-line:nth-child(1) .h1-inner{animation-delay:.3s}
.hero-h1 .h1-line:nth-child(2) .h1-inner{animation-delay:.46s}
.hero-h1 .h1-line:nth-child(3) .h1-inner{animation-delay:.62s}
@keyframes lineUp{from{transform:translateY(105%);opacity:0}to{transform:translateY(0);opacity:1}}
.hero-h1 .ghost{-webkit-text-stroke:1px rgba(226,235,232,0.15);color:transparent}
.hero-h1 .lime{color:var(--lime)}
.hero-bottom{display:flex;align-items:flex-end;justify-content:space-between;margin-top:64px;gap:40px;animation:fadeUp .8s .5s both}
.hero-sub{font-size:16px;line-height:1.8;color:var(--fg2);max-width:440px;font-weight:300}
.hero-sub strong{color:var(--fg);font-weight:500}
.hero-ctas{display:flex;gap:12px;flex-shrink:0;align-items:center}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.numbers{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid rgba(255,255,255,0.05)}
.num-cell{padding:56px 48px;border-right:1px solid rgba(255,255,255,0.05);transition:background .2s}
.num-cell:last-child{border-right:none}
.num-cell:hover{background:var(--k1)}
.num-big{font-family:'Bebas Neue',sans-serif;font-size:72px;line-height:1;color:var(--fg);letter-spacing:-1px;margin-bottom:8px}
.num-big span{color:var(--lime);font-size:40px}
.num-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--fg3)}

.services-preview{padding:80px 56px;border-bottom:1px solid rgba(255,255,255,0.05)}
.services-preview-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:56px}
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,0.04)}
.preview-card{background:var(--k);padding:40px 32px;transition:background .2s;cursor:default;position:relative;overflow:hidden}
.preview-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--lime);transition:width .3s}
.preview-card:hover{background:var(--k1)}
.preview-card:hover::after{width:100%}
.preview-num{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--fg3);margin-bottom:20px}
.preview-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.5px;color:var(--fg);margin-bottom:12px;line-height:1.1}
.preview-body{font-size:13px;line-height:1.7;color:var(--fg2);font-weight:300}

.statement{padding:120px 56px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;border-bottom:1px solid rgba(255,255,255,0.05);position:relative;overflow:hidden}
.statement::after{content:'';position:absolute;right:-200px;top:50%;transform:translateY(-50%);width:500px;height:500px;border-radius:50%;border:1px solid rgba(74,127,212,0.06);pointer-events:none}
.statement-left h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,6vw,80px);line-height:.95;color:var(--fg);margin-top:24px}
.statement-left h2 em{font-style:normal;color:var(--lime)}
.statement-right{display:flex;flex-direction:column;gap:40px}
.stmt-point{padding-left:24px;border-left:1px solid var(--wire2)}
.stmt-point-title{font-size:15px;font-weight:500;color:var(--fg);margin-bottom:8px}
.stmt-point-body{font-size:13px;line-height:1.75;color:var(--fg2);font-weight:300}

/* ══════════════════════════════════════
   SERVICES PAGE
══════════════════════════════════════ */
.services-list{display:grid;grid-template-columns:1fr 1fr}
.svc{padding:64px 56px;border-right:1px solid rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.04);position:relative;overflow:hidden;transition:background .25s;cursor:default}
.svc:nth-child(even){border-right:none}
.svc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--lime);transform:scaleY(0);transform-origin:top;transition:transform .3s ease}
.svc:hover{background:var(--k1)}
.svc:hover::before{transform:scaleY(1)}
.svc-num{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--fg3);margin-bottom:28px}
.svc-name{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:.5px;color:var(--fg);margin-bottom:20px;line-height:1}
.svc-body{font-size:14px;line-height:1.8;color:var(--fg2);max-width:420px;font-weight:300;margin-bottom:32px}
.svc-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:36px}
.svc-features{list-style:none;display:flex;flex-direction:column;gap:10px}
.svc-features li{font-size:13px;color:var(--fg2);font-weight:300;display:flex;align-items:flex-start;gap:12px}
.svc-features li::before{content:'—';color:var(--lime);flex-shrink:0;font-family:'DM Mono',monospace}

/* ══════════════════════════════════════
   PROCESS PAGE
══════════════════════════════════════ */
.process-full{padding:0 56px 100px}
.steps-large{display:flex;flex-direction:column}
.step-row{display:grid;grid-template-columns:180px 1fr;border-bottom:1px solid rgba(255,255,255,0.05);padding:72px 0;gap:80px;align-items:start;transition:background .2s;position:relative}
.step-row:hover{background:var(--k1)}
.step-row:first-child{border-top:1px solid rgba(255,255,255,0.05)}
.step-num-big{font-family:'Bebas Neue',sans-serif;font-size:100px;line-height:1;color:rgba(74,127,212,0.08);letter-spacing:-3px;margin-bottom:-12px}
.step-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--fg3)}
.step-title{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:.5px;color:var(--fg);line-height:1;margin-bottom:20px}
.step-body{font-size:15px;line-height:1.85;color:var(--fg2);font-weight:300;max-width:580px;margin-bottom:28px}
.step-details{display:flex;flex-wrap:wrap;gap:8px}

.guarantee-strip{background:var(--k1);border:1px solid rgba(74,127,212,0.15);padding:64px 56px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:48px;margin:0 56px 80px}
.guarantee-icon{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--lime);margin-bottom:16px}
.guarantee-title{font-size:15px;font-weight:500;color:var(--fg);margin-bottom:8px}
.guarantee-body{font-size:13px;line-height:1.75;color:var(--fg2);font-weight:300}

/* ══════════════════════════════════════
   ABOUT PAGE
══════════════════════════════════════ */
.about-split{padding:80px 56px;display:grid;grid-template-columns:1fr 1.3fr;gap:100px;align-items:start;border-bottom:1px solid rgba(255,255,255,0.05)}
.about-left h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,5.5vw,72px);line-height:.95;color:var(--fg);margin-top:24px;margin-bottom:32px}
.about-body{font-size:15px;line-height:1.9;color:var(--fg2);font-weight:300;margin-bottom:20px}
.about-right{padding-top:8px}
.about-block{padding:32px 0;border-top:1px solid rgba(255,255,255,0.05);display:grid;grid-template-columns:80px 1fr;gap:24px;align-items:start}
.about-block:last-child{border-bottom:1px solid rgba(255,255,255,0.05)}
.about-block-num{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--fg3);padding-top:3px}
.about-block-title{font-size:15px;font-weight:500;color:var(--fg);margin-bottom:8px}
.about-block-body{font-size:13px;line-height:1.75;color:var(--fg2);font-weight:300}

.sectors{padding:80px 56px;border-bottom:1px solid rgba(255,255,255,0.05)}
.sectors-header{margin-bottom:56px}
.sectors-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,0.04)}
.sector-card{background:var(--k);padding:40px 36px;transition:background .2s;position:relative;overflow:hidden}
.sector-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--lime);transition:width .3s}
.sector-card:hover{background:var(--k1)}
.sector-card:hover::after{width:100%}
.sector-name{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--fg);margin-bottom:12px;line-height:1}
.sector-body{font-size:13px;line-height:1.7;color:var(--fg2);font-weight:300}

.values{padding:80px 56px;border-bottom:1px solid rgba(255,255,255,0.05);display:grid;grid-template-columns:300px 1fr;gap:100px;align-items:start}
.values-left h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,5vw,64px);line-height:.95;color:var(--fg);margin-top:24px}
.values-left h2 em{font-style:normal;color:var(--lime)}
.values-right{display:flex;flex-direction:column}
.value-row{display:flex;gap:48px;padding:36px 0;border-bottom:1px solid rgba(255,255,255,0.05);align-items:start}
.value-row:first-child{border-top:1px solid rgba(255,255,255,0.05)}
.value-num{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--fg3);flex-shrink:0;width:24px;padding-top:3px}
.value-title{font-size:15px;font-weight:500;color:var(--fg);margin-bottom:8px}
.value-body{font-size:13px;line-height:1.75;color:var(--fg2);font-weight:300}

/* ══════════════════════════════════════
   CONTACT PAGE
══════════════════════════════════════ */
.contact-layout{padding:80px 56px 100px;display:grid;grid-template-columns:1fr 1.1fr;gap:100px;align-items:start}
.contact-left h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,5vw,64px);line-height:.95;color:var(--fg);margin-top:24px;margin-bottom:32px}
.contact-body{font-size:15px;line-height:1.85;color:var(--fg2);font-weight:300;margin-bottom:48px}
.contact-links{display:flex;flex-direction:column}
.c-link{display:flex;justify-content:space-between;align-items:center;padding:24px 0;border-top:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:all .2s;text-decoration:none}
.c-link:last-child{border-bottom:1px solid rgba(255,255,255,0.05)}
.c-link:hover .c-link-label{color:var(--lime)}
.c-link:hover .c-arr{transform:translate(4px,-4px)}
.c-link-label{font-size:15px;font-weight:500;color:var(--fg);transition:color .2s}
.c-link-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--fg3);margin-top:4px}
.c-arr{font-size:20px;color:var(--fg3);transition:transform .2s}

.contact-form{display:flex;flex-direction:column}
.form-row{position:relative;border-top:1px solid rgba(255,255,255,0.06)}
.form-row:last-of-type{border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:32px}
.form-row label{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--fg3);padding:20px 0 4px}
.form-row input,.form-row textarea,.form-row select{width:100%;background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;color:var(--fg);padding-bottom:18px;resize:none;caret-color:var(--lime)}
.form-row textarea{min-height:120px}
.form-row input::placeholder,.form-row textarea::placeholder{color:var(--fg3)}
select option{background:var(--k2);color:var(--fg)}
.form-submit{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;background:var(--lime);color:#fff;border:none;padding:22px 48px;cursor:pointer;font-weight:500;transition:all .15s;width:100%}
.form-submit:hover{background:var(--lime2)}
.form-success{display:none;text-align:center;padding:60px 20px}
.form-success-icon{font-family:'Bebas Neue',sans-serif;font-size:80px;color:var(--lime);line-height:1;margin-bottom:16px}
.form-success h3{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--fg);margin-bottom:12px}
.form-success p{font-size:14px;color:var(--fg2);font-weight:300;line-height:1.7}

.faq{padding:80px 56px;border-top:1px solid rgba(255,255,255,0.05)}
.faq-header{margin-bottom:48px}
.faq-list{display:flex;flex-direction:column;max-width:780px}
.faq-item{border-top:1px solid rgba(255,255,255,0.05)}
.faq-item:last-child{border-bottom:1px solid rgba(255,255,255,0.05)}
.faq-q{display:flex;justify-content:space-between;align-items:center;padding:24px 0;cursor:pointer;font-size:15px;font-weight:500;color:var(--fg);user-select:none;transition:color .2s;gap:20px}
.faq-q:hover{color:var(--lime)}
.faq-toggle{font-family:'DM Mono',monospace;font-size:18px;color:var(--fg3);flex-shrink:0;transition:transform .25s}
.faq-a{font-size:13px;line-height:1.8;color:var(--fg2);font-weight:300;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;padding-bottom:0}
.faq-item.open .faq-a{max-height:300px;padding-bottom:24px}
.faq-item.open .faq-toggle{transform:rotate(45deg);color:var(--lime)}

/* ── CTA STRIP (shared) ── */
.cta-strip{padding:100px 56px;display:flex;align-items:center;justify-content:space-between;gap:40px;border-top:1px solid rgba(255,255,255,0.05)}
.cta-strip h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,5vw,64px);line-height:.95;color:var(--fg)}
.cta-strip h2 em{font-style:normal;color:var(--lime)}

.founder-block{margin-top:40px;display:inline-flex;flex-direction:column;gap:0}
.founder-img{width:160px;height:160px;object-fit:cover;object-position:center top;filter:grayscale(20%)}
.founder-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--fg2);padding:12px 0 0;display:flex;flex-direction:column;gap:4px}
.founder-label span{color:var(--lime);font-size:9px;letter-spacing:3px}

.footer-founder{display:flex;align-items:center;gap:16px;padding-bottom:28px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:28px}
.footer-founder-img{width:52px;height:52px;object-fit:cover;object-position:center top;border-radius:50%;filter:grayscale(15%)}
.footer-founder-info{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--fg2);display:flex;flex-direction:column;gap:4px}
.footer-founder-info span{color:var(--lime);font-size:9px;letter-spacing:3px}

/* ── WHATSAPP FLOAT ── */
.wa-float{position:fixed;bottom:32px;right:32px;z-index:300;display:flex;align-items:center;gap:12px;background:#25D366;color:#fff;padding:14px 20px 14px 16px;text-decoration:none;box-shadow:0 8px 32px rgba(37,211,102,0.35);transition:all .2s;cursor:pointer;border-radius:50px}
.wa-float:hover{background:#22c55e;transform:translateY(-2px);box-shadow:0 12px 40px rgba(37,211,102,0.45)}
.wa-float svg{width:22px;height:22px;flex-shrink:0}
.wa-float-text{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500}

/* ── FREE DISCOVERY BADGE ── */
.free-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(74,127,212,0.07);border:1px solid rgba(74,127,212,0.2);padding:12px 20px;margin-bottom:24px}
.free-badge-dot{width:7px;height:7px;background:var(--lime);border-radius:50%;animation:pulse 2s infinite}
.free-badge-text{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--lime)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── SOCIAL PROOF STRIP ── */
.proof-strip{padding:64px 56px;border-bottom:1px solid rgba(255,255,255,0.05);background:var(--k1)}
.proof-strip-header{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--fg3);margin-bottom:40px;display:flex;align-items:center;gap:14px}
.proof-strip-header span{display:block;width:32px;height:1px;background:var(--fg3)}
.proof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,0.04)}
.proof-card{background:var(--k1);padding:40px 36px}
.proof-quote{font-size:15px;line-height:1.8;color:var(--fg);font-weight:300;margin-bottom:28px;font-style:italic}
.proof-quote::before{content:'"';color:var(--lime);font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:0;vertical-align:-12px;margin-right:4px}
.proof-attr{display:flex;align-items:center;gap:12px}
.proof-dot{width:6px;height:6px;background:var(--lime);flex-shrink:0}
.proof-name{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--fg2)}
.proof-company{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--fg3);margin-top:3px}
@media(max-width:900px){

  .proof-strip{padding:60px 24px}
  .wa-float{bottom:20px;right:20px;padding:12px 16px 12px 14px}
}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none}

.nav-hamburger.open span:nth-child(2){opacity:0}
.nav-hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
.mobile-menu{

  position:fixed;top:0;right:0;bottom:0;width:280px;

  border-left:1px solid rgba(255,255,255,0.06);

.mobile-menu.open{transform:translateX(0)}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:198;backdrop-filter:blur(4px)}
.mobile-overlay.open{display:block}
.mobile-menu a{

.mobile-menu a:first-child{border-top:1px solid rgba(255,255,255,0.05)}
.mobile-menu a:hover{color:var(--lime)}
.mobile-menu .mob-cta{

<section class="page-hero">
  <div class="page-hero-kicker"><span></span>What We Build</div>
  <h1>SERVICES<br><em>THAT SHIP.</em></h1>
  <p class="page-hero-sub">Every system is <strong>engineered from scratch</strong> around your business logic. No platforms. No plug-ins. No templates. Just precise software that does exactly what you need.</p>
</section>

<div class="services-list reveal reveal-grid">
  <div class="svc">
    <div class="svc-num">01 — Automation</div>
    <div class="svc-name">Workflow Automation</div>
    <div class="svc-body">We map your manual processes and replace them with intelligent pipelines. Less overhead, faster cycles, zero human error on the work that doesn't need humans.</div>
    <div class="svc-tags"><span class="tag">Process Mapping</span><span class="tag">API Integration</span><span class="tag">Event Triggers</span><span class="tag">Scheduled Jobs</span></div>
    <ul class="svc-features">
      <li>End-to-end process analysis and redesign</li>
      <li>Multi-system integrations (CRM, ERP, email, WhatsApp)</li>
      <li>Real-time event-driven triggers and notifications</li>
      <li>Audit trails and error handling built in</li>
    </ul>
  </div>
  <div class="svc">
    <div class="svc-num">02 — Quoting</div>
    <div class="svc-name">Automated Quoting</div>
    <div class="svc-body">Intelligent pricing engines that parse complex inputs — materials, dimensions, labour, margin rules — and generate accurate, branded quotes in seconds, not hours.</div>
    <div class="svc-tags"><span class="tag">Pricing Logic</span><span class="tag">PDF Generation</span><span class="tag">CRM Sync</span><span class="tag">Approval Flows</span></div>
    <ul class="svc-features">
      <li>Custom pricing rules and margin calculations</li>
      <li>Branded PDF quote generation</li>
      <li>Client portal for quote review and sign-off</li>
      <li>CRM sync and pipeline tracking</li>
    </ul>
  </div>
  <div class="svc">
    <div class="svc-num">03 — Intelligence</div>
    <div class="svc-name">Market & Data Intelligence</div>
    <div class="svc-body">Custom dashboards and research platforms that turn raw data into actionable signals — built for investors, traders, and operators who need an edge over the market.</div>
    <div class="svc-tags"><span class="tag">Live Data Feeds</span><span class="tag">Custom Reports</span><span class="tag">Supply Chain</span><span class="tag">AI Research</span></div>
    <ul class="svc-features">
      <li>Live price feeds and market data pipelines</li>
      <li>AI-powered research and summarisation</li>
      <li>Supply chain visibility and risk monitoring</li>
      <li>Daily digest emails and alerting systems</li>
    </ul>
  </div>
  <div class="svc">
    <div class="svc-num">04 — Compliance</div>
    <div class="svc-name">Compliance & Document AI</div>
    <div class="svc-body">Automated document generation for regulatory standards. Systems that keep your business compliant without burying your team in paperwork every audit cycle.</div>
    <div class="svc-tags"><span class="tag">HACCP</span><span class="tag">ESG Reporting</span><span class="tag">SABS</span><span class="tag">ISO</span></div>
    <ul class="svc-features">
      <li>HACCP and food safety documentation</li>
      <li>ESG compliance reporting and data capture</li>
      <li>SABS and ISO document generation</li>
      <li>Scheduled compliance review reminders</li>
    </ul>
  </div>
  <div class="svc">
    <div class="svc-num">05 — Knowledge</div>
    <div class="svc-name">Internal AI Knowledge Base</div>
    <div class="svc-body">A custom AI assistant trained on your company's documents, SOPs, and data. Your team gets instant answers from your internal knowledge — without digging through folders.</div>

<section class="page-hero">
  <div class="page-hero-kicker"><span></span>How We Work</div>
  <h1>THE<br><em>PROCESS.</em></h1>
  <p class="page-hero-sub">No surprises. No scope creep. No silence. Here's exactly what happens from the moment you reach out to the moment your system goes live.</p>
</section>

<div class="process-full">
  <div class="steps-large">
    <div class="step-row reveal">
      <div class="step-left"><div class="step-num-big">01</div><div class="step-label">Week 1</div></div>
      <div class="step-right">
        <div class="step-title">Discovery</div>
        <div class="step-body">One focused session — in person, on a call, or over WhatsApp. We dig into your workflows, pain points, data landscape, and constraints. We ask the uncomfortable questions. We leave with a complete picture of what needs to be built and why. You leave with a written summary and a clear plan before we charge you a cent.</div>
        <div class="step-details"><span class="tag">Process Analysis</span><span class="tag">Stakeholder Interviews</span><span class="tag">Written Summary</span><span class="tag">No Charge</span></div>
      </div>
    </div>
    <div class="step-row reveal">
      <div class="step-left"><div class="step-num-big">02</div><div class="step-label">Week 1–2</div></div>
      <div class="step-right">
        <div class="step-title">Architecture</div>
        <div class="step-body">Before any code is written, we design the full system. Inputs, logic, outputs, integrations, data flows, edge cases. You see the complete blueprint — in plain language, not tech jargon. You approve it. Then we price it. Then we build it. This step prevents the single biggest reason software projects fail: building the wrong thing.</div>
        <div class="step-details"><span class="tag">System Blueprint</span><span class="tag">Integration Map</span><span class="tag">Fixed Price Quote</span><span class="tag">Plain Language Spec</span></div>
      </div>
    </div>
    <div class="step-row reveal">
      <div class="step-left"><div class="step-num-big">03</div><div class="step-label">Week 2–4</div></div>
      <div class="step-right">
        <div class="step-title">Build</div>
        <div class="step-body">Rapid development in tight cycles. You get a working prototype within 24 hours of build start — something real you can click, test, and give feedback on. Not a Figma file. Not a presentation. Actual working software. We iterate fast. You stay in the loop the whole way through. No black box, no waiting weeks to see progress.</div>
        <div class="step-details"><span class="tag">24H First Prototype</span><span class="tag">Daily Updates</span><span class="tag">Continuous Feedback</span><span class="tag">Fast Iteration</span></div>
      </div>
    </div>
    <div class="step-row reveal">
      <div class="step-left"><div class="step-num-big">04</div><div class="step-label">Week 4+</div></div>
      <div class="step-right">
        <div class="step-title">Deploy & Own</div>
        <div class="step-body">We deploy to your infrastructure — your server, your cloud account, your domain. Full handover session included: how the system works, how to use it, how to maintain it. You receive the complete source code, technical documentation, and deployment guide. No subscriptions. No lock-in. No ongoing dependency on us. It's yours, permanently.</div>
        <div class="step-details"><span class="tag">Your Infrastructure</span><span class="tag">Full Source Code</span><span class="tag">Documentation</span><span class="tag">Handover Session</span></div>
      </div>
    </div>
  </div>
</div>

<div class="guarantee-strip reveal">
  <div><div class="guarantee-icon">→</div><div class="guarantee-title">Fixed price. No surprises.</div><div class="guarantee-body">Once we've agreed the spec, the price is locked. No surprise invoices when the scope gets complex.</div></div>
  <div><div class="guarantee-icon">→</div><div class="guarantee-title">You talk to the builder.</div><div class="guarantee-body">No account managers, no project coordinators. The person you brief is the person writing the code.</div></div>
  <div><div class="guarantee-icon">→</div><div class="guarantee-title">No lock-in. Ever.</div><div class="guarantee-body">Every system we build is yours to own, modify, and operate independently. We're not a subscription.</div></div>

<section class="page-hero">
  <div class="page-hero-kicker"><span></span>About Meri-Software</div>
  <h1>BUILT BY<br><em>BUILDERS.</em></h1>
  <p class="page-hero-sub">We're a custom software studio based in South Africa. We work <strong>directly with the businesses we build for</strong> — no account managers, no outsourced development, no bloated retainers.</p>
</section>

<section class="about-split">
  <div class="about-left reveal">
    <div class="sec-eyebrow">Who We Are</div>
    <h2>DIRECT.<br>PRECISE.<br>ACCOUNTABLE.</h2>
    <p class="about-body">Meri-Software started as a market intelligence platform and evolved into something bigger: a studio that builds custom AI-powered software for businesses that are serious about operating smarter.</p>
    <p class="about-body">We've shipped systems for mining companies in Namibia, cold storage manufacturers in Gauteng, traders tracking commodity markets, and property groups drowning in manual reporting. The common thread: businesses with complex, specific problems that off-the-shelf software can't solve.</p>
    <p class="about-body">Every project is taken on personally. You work with the person who designs and builds your system — not an account manager who relays messages to a team you'll never meet.</p>
    <button class="btn-solid" style="margin-top:16px" onclick="navigate('contact')">Start a Conversation</button>
  </div>
  </div>
  <div class="about-right reveal">
    <div class="about-block"><div class="about-block-num">01</div><div><div class="about-block-title">Sector experience</div><div class="about-block-body">Mining, cold storage, manufacturing, financial services, property. We understand the operational realities of these industries — not just the software side.</div></div></div>
    <div class="about-block"><div class="about-block-num">02</div><div><div class="about-block-title">Direct relationship</div><div class="about-block-body">You work with the person building your system. No project managers relaying messages. No offshore dev teams you'll never speak to.</div></div></div>
    <div class="about-block"><div class="about-block-num">03</div><div><div class="about-block-title">Full-stack delivery</div><div class="about-block-body">Frontend, backend, integrations, deployment, documentation. We handle the complete build so your team can focus on using it, not managing it.</div></div></div>
    <div class="about-block"><div class="about-block-num">04</div><div><div class="about-block-title">South African built</div><div class="about-block-body">Based in SA, building for SA businesses and beyond. We know the local market, the compliance landscape, and the specific constraints you operate in.</div></div></div>
  </div>
</section>

<section class="sectors">
  <div class="sectors-header reveal"><div class="sec-eyebrow">Industries</div><div class="sec-title" style="margin-top:12px">SECTORS WE'VE<br><em>WORKED IN</em></div></div>
  <div class="sectors-grid reveal reveal-grid">
    <div class="sector-card"><div class="sector-name">Mining & Resources</div><div class="sector-body">Market intelligence dashboards, ESG compliance systems, internal knowledge assistants for mining operations across Southern Africa.</div></div>
    <div class="sector-card"><div class="sector-name">Cold Storage & Manufacturing</div><div class="sector-body">Automated quoting tools, HACCP compliance document generators, and custom ERP integrations for insulated panel manufacturers.</div></div>
    <div class="sector-card"><div class="sector-name">Financial Services & Trading</div><div class="sector-body">Supply chain intelligence platforms, live commodity pricing dashboards, and AI-powered research tools for investors and traders.</div></div>
    <div class="sector-card"><div class="sector-name">Property & Construction</div><div class="sector-body">Workflow automation, document management, and client-facing portals for property groups managing complex portfolios.</div></div>
    <div class="sector-card"><div class="sector-name">Retail & E-Commerce</div><div class="sector-body">Automated order fulfilment, inventory intelligence, and customer workflow systems that scale without adding headcount.</div></div>
    <div class="sector-card"><div class="sector-name">Your Industry</div><div class="sector-body">If you have a specific problem that requires a custom solution, we want to hear about it. Bring the problem — we'll engineer the answer.</div></div>
  </div>
</section>

<section class="values">
  <div class="values-left reveal"><div class="sec-eyebrow">What We Stand For</div><h2>HOW WE<br>OPERATE<br><em>DIFFERENTLY.</em></h2></div>
  <div class="values-right reveal">
    <div class="value-row"><div class="value-num">01</div><div><div class="value-title">Ownership over dependency</div><div class="value-body">Every system we build is yours. Full source code, full documentation, deployed to your infrastructure. We're not building you a subscription — we're building you an asset.</div></div></div>
    <div class="value-row"><div class="value-num">02</div><div><div class="value-title">Specificity over scale</div><div class="value-body">We don't try to work with everyone. We take on a limited number of projects at a time so that each one gets the attention it deserves. Quality over volume, every time.</div></div></div>
    <div class="value-row"><div class="value-num">03</div><div><div class="value-title">Transparency over polish</div><div class="value-body">We tell you what's possible, what's realistic, and what it costs — before we start. No hidden fees, no scope creep, no surprises. Straight talk from day one.</div></div></div>
    <div class="value-row"><div class="value-num">04</div><div><div class="value-title">Results over process</div><div class="value-body">We don't care about methodology theatre. We care about shipping software that actually works and makes your business run better. That's the only metric that matters.</div></div></div>
  </div>
</section>

<section class="faq">
  <div class="faq-header reveal"><div class="sec-eyebrow">Common Questions</div><div class="sec-title" style="margin-top:12px">FAQ</div></div>
  <div class="faq-list reveal">
    <div class="faq-item"><div class="faq-q" onclick="toggleFaq(this)">How long does a typical project take?<span class="faq-toggle">+</span></div><div class="faq-a">It depends entirely on scope. Simple automation systems can be live in 1–2 weeks. Complex multi-system integrations typically take 4–8 weeks. We give you a realistic timeline upfront — after the discovery session — so there are no surprises.</div></div>
    <div class="faq-item"><div class="faq-q" onclick="toggleFaq(this)">How do you price projects?<span class="faq-toggle">+</span></div><div class="faq-a">Fixed price, agreed before we start. Once we've done discovery and designed the architecture, you receive a single price for the full build. No hourly billing, no scope creep invoices. What we quote is what you pay.</div></div>
    <div class="faq-item"><div class="faq-q" onclick="toggleFaq(this)">Do I need technical knowledge to work with you?<span class="faq-toggle">+</span></div><div class="faq-a">Not at all. We translate technical decisions into plain language throughout. You need to understand your business problem — we handle everything else. Our clients range from technical CTOs to business owners who've never touched code.</div></div>
    <div class="faq-item"><div class="faq-q" onclick="toggleFaq(this)">Can you integrate with our existing systems?<span class="faq-toggle">+</span></div><div class="faq-a">Yes. Integration is one of our core strengths. We've connected to SYSPRO, Odoo, Salesforce, various CRMs, ERPs, WhatsApp Business API, email platforms, and custom databases. If it has an API or database access, we can connect to it.</div></div>
    <div class="faq-item"><div class="faq-q" onclick="toggleFaq(this)">What happens after delivery?<span class="faq-toggle">+</span></div><div class="faq-a">You receive full source code, technical documentation, and a handover session. The system is deployed to your infrastructure and you own it completely. We're available for ongoing maintenance or feature additions as a separate engagement — but there's no ongoing dependency or subscription required.</div></div>
    <div class="faq-item"><div class="faq-q" onclick="toggleFaq(this)">Do you work with companies outside South Africa?<span class="faq-toggle">+</span></div><div class="faq-a">Yes. We've worked with companies across Southern Africa including Namibia, Zimbabwe, and Botswana. We communicate via WhatsApp, video call, and email — timezone proximity helps, but we've made remote collaboration work well with clients across the continent.</div></div>
  </div>

<script>
// Mobile menu
window.toggleMobileMenu = function() {
  const menu = document.getElementById('mobile-menu');
  const overlay = document.getElementById('mobile-overlay');
  const burger = document.getElementById('hamburger');
  const isOpen = menu.classList.toggle('open');
  overlay.classList.toggle('open', isOpen);
  burger.classList.toggle('open', isOpen);
  document.body.style.overflow = isOpen ? 'hidden' : '';
};
window.closeMobileMenu = function() {
  document.getElementById('mobile-menu').classList.remove('open');
  document.getElementById('mobile-overlay').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
  document.body.style.overflow = '';
};

// Dynamic copyright year
function setYear() {
  document.querySelectorAll('.year').forEach(el => el.textContent = new Date().getFullYear());
}

const app = document.getElementById('app');
const navEl = document.getElementById('nav');

function navigate(page) {
  app.classList.add('fade-out');
  setTimeout(() => {
    app.classList.remove('fade-out');
    loadPage(page);
    window.scrollTo(0,0);
    app.classList.add('fade-in');
    setTimeout(() => app.classList.remove('fade-in'), 400);
  }, 180);
}

function loadPage(page) {
  const tpl = document.getElementById('tpl-' + page);
  if (!tpl) return;
  app.innerHTML = tpl.innerHTML;

  // Update active nav link
  document.querySelectorAll('.nav-links a').forEach(a => {
    a.classList.remove('active');
    if (a.getAttribute('onclick') && a.getAttribute('onclick').includes("'" + page + "'")) {
      a.classList.add('active');
    }
  });

  // Update page title
  const titles = {home:'Meri-Software — We build the software that puts AI to work',services:'Services — Meri-Software',process:'Process — Meri-Software',about:'About — Meri-Software',contact:'Contact — Meri-Software'};
  document.title = titles[page] || 'Meri-Software';

  // Scroll reveal
  const reveals = app.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, {threshold:0.08, rootMargin:'0px 0px -50px 0px'});
  reveals.forEach(el => observer.observe(el));

  // Number counter
  const numSection = app.querySelector('#numbers-section');
  if (numSection) {
    const numObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (!e.isIntersecting) return;
        numObserver.unobserve(e.target);
        e.target.querySelectorAll('[data-count]').forEach(el => {
          const target = parseInt(el.dataset.count);
          if (target === 0) return; // already zero, no animation needed
          const valEl = el.querySelector('.num-val');
          const duration = 1400;
          const start = performance.now();
          function tick(now) {
            const progress = Math.min((now - start) / duration, 1);
            const ease = 1 - Math.pow(1 - progress, 3);
            valEl.textContent = Math.round(ease * target);
            if (progress < 1) requestAnimationFrame(tick);
          }
          requestAnimationFrame(tick);
        });
      });
    }, {threshold: 0.3});
    numObserver.observe(numSection);
  }

  // Push browser history
  history.pushState({page}, '', '#' + page);
  setYear();
}

// Nav shrink on scroll
window.addEventListener('scroll', () => {
  navEl.classList.toggle('scrolled', window.scrollY > 60);
});

// Handle back/forward
window.addEventListener('popstate', (e) => {
  if (e.state && e.state.page) loadPage(e.state.page);
});

// Form submit — wired to Formspree
window.handleSubmit = async function() {
  const name = document.getElementById('f-name')?.value.trim();
  const email = document.getElementById('f-email')?.value.trim();
  const company = document.getElementById('f-company')?.value.trim();
  const type = document.getElementById('f-type')?.value;
  const msg = document.getElementById('f-message')?.value.trim();
  if (!name || !email || !msg) { alert('Please fill in your name, email, and message before sending.'); return; }

  const btn = document.querySelector('.form-submit');
  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    const res = await fetch('https://formspree.io/f/xdavnknv', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ name, email, company, type, message: msg })
    });
    if (res.ok) {
      document.getElementById('contact-form').style.display = 'none';
      document.getElementById('form-success').style.display = 'block';
    } else {
      btn.textContent = 'Send Message →';
      btn.disabled = false;
      alert('Something went wrong. Please email us directly at Visser-Meridian@outlook.com');
    }
  } catch(e) {
    btn.textContent = 'Send Message →';
    btn.disabled = false;
    alert('Could not send. Please email us directly at Visser-Meridian@outlook.com');
  }
};

// FAQ toggle
window.toggleFaq = function(el) {
  const item = el.closest('.faq-item');
  const wasOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
  if (!wasOpen) item.classList.add('open');
};

// Init — load from hash or default to home
const initPage = (location.hash.replace('#','')) || 'home';
loadPage(initPage);
</script>
